name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Portable .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Build .exe (onefile)
        run: |
          python -m PyInstaller `
            --onefile `
            --name "re-gen" `
            --windowed `
            --noconfirm `
            --clean `
            --noupx `
            --collect-all re_gen `
            --collect-submodules re_gen `
            src/re_gen/gui/app.py

      - name: Rename and package
        shell: bash
        run: |
          ls dist/
          7z a re-gen-windows-portable.zip dist/re-gen.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: re-gen-windows
          path: re-gen-windows-portable.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: re-gen-windows-portable.zip
          draft: true
